name: Tests

permissions:
  contents: read

on:
  push:
  pull_request:

jobs:
  test:
  #  The job name is used in the test summary, so we include the Python version for clarity.
    name: "tests (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install limnoria
          PLUGIN_NAME="${GITHUB_REPOSITORY#*/}"
          if [ -f "${PLUGIN_NAME}/requirements.txt" ]; then
            pip install -r "${PLUGIN_NAME}/requirements.txt"
          fi

      - name: Run tests
        shell: bash
        run: |
          PLUGIN_NAME="${GITHUB_REPOSITORY#*/}"
          supybot-test "${PLUGIN_NAME}"
