name: Lint

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  black:
    name: black (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install black
        run: python -m pip install --upgrade pip black

      - name: Run black (check)
        run: black --check --include "\.py$" .